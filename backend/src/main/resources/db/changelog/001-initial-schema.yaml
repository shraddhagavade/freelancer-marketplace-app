databaseChangeLog:
  - changeSet:
      id: 001-users
      author: codex
      changes:
        - createTable:
            tableName: users
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: full_name, type: VARCHAR(150), constraints: { nullable: false } }
              - column: { name: email, type: VARCHAR(180), constraints: { nullable: false, unique: true } }
              - column: { name: password_hash, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: role, type: VARCHAR(40), constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
  - changeSet:
      id: 002-tasks
      author: codex
      changes:
        - createTable:
            tableName: tasks
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: title, type: VARCHAR(180), constraints: { nullable: false } }
              - column: { name: description, type: TEXT, constraints: { nullable: false } }
              - column: { name: budget, type: "DECIMAL(12,2)", constraints: { nullable: false } }
              - column: { name: status, type: VARCHAR(40), constraints: { nullable: false } }
              - column: { name: client_id, type: UUID, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
        - addForeignKeyConstraint:
            baseTableName: tasks
            baseColumnNames: client_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_tasks_client
  - changeSet:
      id: 003-applications
      author: codex
      changes:
        - createTable:
            tableName: applications
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: task_id, type: UUID, constraints: { nullable: false } }
              - column: { name: freelancer_id, type: UUID, constraints: { nullable: false } }
              - column: { name: proposal, type: TEXT, constraints: { nullable: false } }
              - column: { name: bid_amount, type: "DECIMAL(12,2)", constraints: { nullable: false } }
              - column: { name: status, type: VARCHAR(40), constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
        - addForeignKeyConstraint:
            baseTableName: applications
            baseColumnNames: task_id
            referencedTableName: tasks
            referencedColumnNames: id
            constraintName: fk_applications_task
        - addForeignKeyConstraint:
            baseTableName: applications
            baseColumnNames: freelancer_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_applications_freelancer
        - addUniqueConstraint:
            tableName: applications
            columnNames: task_id,freelancer_id
            constraintName: uk_task_freelancer_application
  - changeSet:
      id: 004-messages
      author: codex
      changes:
        - createTable:
            tableName: messages
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: task_id, type: UUID, constraints: { nullable: false } }
              - column: { name: sender_id, type: UUID, constraints: { nullable: false } }
              - column: { name: receiver_id, type: UUID, constraints: { nullable: false } }
              - column: { name: content, type: TEXT, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
  - changeSet:
      id: 005-payments
      author: codex
      changes:
        - createTable:
            tableName: payments
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: task_id, type: UUID, constraints: { nullable: false } }
              - column: { name: payer_id, type: UUID, constraints: { nullable: false } }
              - column: { name: payee_id, type: UUID, constraints: { nullable: false } }
              - column: { name: amount, type: "DECIMAL(12,2)", constraints: { nullable: false } }
              - column: { name: status, type: VARCHAR(40), constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
  - changeSet:
      id: 006-reviews
      author: codex
      changes:
        - createTable:
            tableName: reviews
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: task_id, type: UUID, constraints: { nullable: false } }
              - column: { name: reviewer_id, type: UUID, constraints: { nullable: false } }
              - column: { name: reviewee_id, type: UUID, constraints: { nullable: false } }
              - column: { name: rating, type: INT, constraints: { nullable: false } }
              - column: { name: comment, type: TEXT, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
