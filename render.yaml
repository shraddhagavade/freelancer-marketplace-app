services:
  - type: web
    name: freelancer-marketplace-backend
    runtime: docker
    plan: free
    region: singapore
    ipAllowList: []
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/tasks
    envVars:
      - key: PORT
        value: 8080
      - key: DB_URL
        fromDatabase:
          name: freelancer-marketplace-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: freelancer-marketplace-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: freelancer-marketplace-db
          property: password
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: freelancer-marketplace-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: freelancer-marketplace-redis
          property: port
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: 86400000
      - key: PASSWORD_RESET_EXPIRATION_MINUTES
        value: 15
      - key: RATE_LIMIT_RPM
        value: 120
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false

  - type: keyvalue
    name: freelancer-marketplace-redis
    plan: free
    region: singapore
    maxmemoryPolicy: allkeys-lru

databases:
  - name: freelancer-marketplace-db
    plan: free
    region: singapore
